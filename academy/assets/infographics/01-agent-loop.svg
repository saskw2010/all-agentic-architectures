<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="t d">
<title id="t">AI Agent Operating Loop</title><desc id="d">The six-stage operating loop from goal to feedback.</desc>
<defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#36e7d2"/><stop offset=".5" stop-color="#5d8cff"/><stop offset="1" stop-color="#ae7cff"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.txt{font-family:'Segoe UI',sans-serif;fill:#edf7ff}.muted{fill:#91a9bd}.box{fill:#0b1828;stroke:#31516b;stroke-width:2}.edge{stroke:url(#g);stroke-width:7;fill:none;stroke-linecap:round}.num{font:800 20px 'Segoe UI',sans-serif;fill:#36e7d2}.title{font:800 34px 'Segoe UI',sans-serif;fill:#edf7ff}.sub{font:18px 'Segoe UI',sans-serif;fill:#91a9bd}</style></defs>
<rect width="1600" height="900" rx="36" fill="#06101d"/>
<text x="800" y="90" text-anchor="middle" class="txt" font-size="46" font-weight="800">THE AI AGENT OPERATING LOOP</text>
<text x="800" y="132" text-anchor="middle" class="sub">A controlled cycle — not an infinite chain of thoughts</text>
<path class="edge" d="M390 260C650 120 950 120 1210 260C1430 380 1430 590 1210 700C950 835 650 835 390 700C170 590 170 380 390 260Z" opacity=".32"/>
<g transform="translate(180 250)"><rect class="box" width="300" height="160" rx="28"/><text class="num" x="28" y="38">01</text><text class="title" x="150" y="82" text-anchor="middle">GOAL</text><text class="sub" x="150" y="118" text-anchor="middle">Outcome + constraints</text></g>
<g transform="translate(650 140)"><rect class="box" width="300" height="160" rx="28"/><text class="num" x="28" y="38">02</text><text class="title" x="150" y="82" text-anchor="middle">CONTEXT</text><text class="sub" x="150" y="118" text-anchor="middle">Evidence + memory</text></g>
<g transform="translate(1120 250)"><rect class="box" width="300" height="160" rx="28"/><text class="num" x="28" y="38">03</text><text class="title" x="150" y="82" text-anchor="middle">REASON</text><text class="sub" x="150" y="118" text-anchor="middle">Interpret + decide</text></g>
<g transform="translate(1120 540)"><rect class="box" width="300" height="160" rx="28"/><text class="num" x="28" y="38">04</text><text class="title" x="150" y="82" text-anchor="middle">TOOL</text><text class="sub" x="150" y="118" text-anchor="middle">Authorize + execute</text></g>
<g transform="translate(650 650)"><rect class="box" width="300" height="160" rx="28"/><text class="num" x="28" y="38">05</text><text class="title" x="150" y="82" text-anchor="middle">ACTION</text><text class="sub" x="150" y="118" text-anchor="middle">Draft or commit</text></g>
<g transform="translate(180 540)"><rect class="box" width="300" height="160" rx="28"/><text class="num" x="28" y="38">06</text><text class="title" x="150" y="82" text-anchor="middle">FEEDBACK</text><text class="sub" x="150" y="118" text-anchor="middle">Observe + learn</text></g>
<g transform="translate(800 465)"><circle r="120" fill="#0a2232" stroke="url(#g)" stroke-width="7" filter="url(#glow)"/><text class="txt" font-size="30" font-weight="800" text-anchor="middle" y="-10">POLICY GATE</text><text class="sub" text-anchor="middle" y="28">Validate every turn</text></g>
<circle r="12" fill="#36e7d2" filter="url(#glow)"><animateMotion dur="7s" repeatCount="indefinite" path="M390 260C650 120 950 120 1210 260C1430 380 1430 590 1210 700C950 835 650 835 390 700C170 590 170 380 390 260Z"/></circle>
</svg>