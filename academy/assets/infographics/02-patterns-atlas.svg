<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="t d">
<title id="t">Agent Design Patterns Atlas</title><desc id="d">A visual decision atlas grouping agent design patterns by the failure mode they address.</desc>
<defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#36e7d2"/><stop offset="1" stop-color="#5d8cff"/></linearGradient><style>.h{font:800 42px 'Segoe UI',sans-serif;fill:#edf7ff}.k{font:700 27px 'Segoe UI',sans-serif;fill:#edf7ff}.p{font:17px 'Segoe UI',sans-serif;fill:#91a9bd}.box{fill:#0b1828;stroke:#31516b;stroke-width:2}.chip{fill:#102338;stroke:#456884}.line{stroke:#31516b;stroke-width:3;fill:none}</style></defs>
<rect width="1600" height="1000" rx="36" fill="#06101d"/>
<text x="800" y="78" text-anchor="middle" class="h">AGENT DESIGN PATTERNS ATLAS</text>
<text x="800" y="116" text-anchor="middle" class="p">Select a pattern by failure mode — not popularity</text>
<g transform="translate(650 390)"><circle cx="150" cy="110" r="130" fill="#092330" stroke="url(#g)" stroke-width="7"/><text class="k" x="150" y="96" text-anchor="middle">TASK</text><text class="k" x="150" y="132" text-anchor="middle">FAILURE MODE</text></g>
<path class="line" d="M800 390L800 260M650 450L480 310M650 540L470 670M950 450L1120 310M950 540L1130 670M800 610L800 760"/>
<g transform="translate(590 130)"><rect class="box" width="420" height="150" rx="24"/><text class="k" x="210" y="48" text-anchor="middle">Ambiguous destination</text><text class="p" x="210" y="80" text-anchor="middle">Router · Intent Classifier</text><rect class="chip" x="110" y="100" width="200" height="32" rx="16"/><text class="p" x="210" y="122" text-anchor="middle">Choose the right path</text></g>
<g transform="translate(100 210)"><rect class="box" width="420" height="180" rx="24"/><text class="k" x="210" y="48" text-anchor="middle">Unknown information</text><text class="p" x="210" y="84" text-anchor="middle">RAG · Agentic RAG · GraphRAG</text><text class="p" x="210" y="120" text-anchor="middle">Retrieve, rerank, ground, cite</text></g>
<g transform="translate(1080 210)"><rect class="box" width="420" height="180" rx="24"/><text class="k" x="210" y="48" text-anchor="middle">Multi-step execution</text><text class="p" x="210" y="84" text-anchor="middle">ReAct · Plan-and-Execute · PEV</text><text class="p" x="210" y="120" text-anchor="middle">Plan, act, observe, replan</text></g>
<g transform="translate(100 620)"><rect class="box" width="420" height="180" rx="24"/><text class="k" x="210" y="48" text-anchor="middle">Quality uncertainty</text><text class="p" x="210" y="84" text-anchor="middle">Reflection · Evaluator-Optimizer</text><text class="p" x="210" y="120" text-anchor="middle">Critique with rubric + stop rule</text></g>
<g transform="translate(1080 620)"><rect class="box" width="420" height="180" rx="24"/><text class="k" x="210" y="48" text-anchor="middle">Need specialization</text><text class="p" x="210" y="84" text-anchor="middle">Manager-Worker · Debate · Blackboard</text><text class="p" x="210" y="120" text-anchor="middle">Delegate through contracts</text></g>
<g transform="translate(590 760)"><rect class="box" width="420" height="170" rx="24"/><text class="k" x="210" y="48" text-anchor="middle">High consequence</text><text class="p" x="210" y="84" text-anchor="middle">Human Gate · Dry Run · DraftOnly</text><text class="p" x="210" y="120" text-anchor="middle">Control before autonomy</text></g>
</svg>