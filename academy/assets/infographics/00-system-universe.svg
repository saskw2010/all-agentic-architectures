<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
<title id="title">Agentic Systems Universe</title>
<desc id="desc">Nine architecture domains connected to the Agentic Systems core.</desc>
<defs>
  <radialGradient id="bg" cx="50%" cy="45%" r="70%"><stop offset="0" stop-color="#12324a"/><stop offset="1" stop-color="#06101d"/></radialGradient>
  <linearGradient id="core" x1="0" x2="1"><stop stop-color="#36e7d2"/><stop offset="1" stop-color="#5d8cff"/></linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <style>
    .node{fill:#0b1828;stroke:#31516b;stroke-width:2}.node:hover{stroke:#36e7d2}
    .label{font:700 25px 'Segoe UI',sans-serif;fill:#edf7ff}.sub{font:16px 'Segoe UI',sans-serif;fill:#91a9bd}
    .wire{stroke:#31516b;stroke-width:3;fill:none;stroke-dasharray:10 12;animation:flow 5s linear infinite}
    .dot{fill:#36e7d2;filter:url(#glow)} @keyframes flow{to{stroke-dashoffset:-44}}
  </style>
</defs>
<rect width="1600" height="1000" rx="36" fill="url(#bg)"/>
<g opacity=".34" stroke="#17364c"><path d="M0 100H1600M0 200H1600M0 300H1600M0 400H1600M0 500H1600M0 600H1600M0 700H1600M0 800H1600M0 900H1600"/><path d="M100 0V1000M200 0V1000M300 0V1000M400 0V1000M500 0V1000M600 0V1000M700 0V1000M800 0V1000M900 0V1000M1000 0V1000M1100 0V1000M1200 0V1000M1300 0V1000M1400 0V1000M1500 0V1000"/></g>
<g class="wires">
  <path class="wire" d="M800 500L800 165"/><path class="wire" d="M800 500L1190 220"/><path class="wire" d="M800 500L1370 480"/>
  <path class="wire" d="M800 500L1190 790"/><path class="wire" d="M800 500L800 855"/><path class="wire" d="M800 500L410 790"/>
  <path class="wire" d="M800 500L230 480"/><path class="wire" d="M800 500L410 220"/>
</g>
<g transform="translate(800 500)">
  <circle r="155" fill="#071725" stroke="url(#core)" stroke-width="7" filter="url(#glow)"/>
  <circle r="125" fill="none" stroke="#36e7d2" stroke-opacity=".22" stroke-width="2" stroke-dasharray="8 10">
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/>
  </circle>
  <text class="sub" text-anchor="middle" y="-32" fill="#36e7d2">THE OPERATING CORE</text>
  <text class="label" text-anchor="middle" y="12" font-size="44">AGENTIC SYSTEMS</text>
  <text class="sub" text-anchor="middle" y="48">Think · Act · Learn · Govern</text>
</g>
<g transform="translate(650 90)"><rect class="node" width="300" height="140" rx="24"/><text class="label" x="150" y="55" text-anchor="middle">Foundations</text><text class="sub" x="150" y="88" text-anchor="middle">Goals · Autonomy · Contracts</text></g>
<g transform="translate(1060 135)"><rect class="node" width="300" height="140" rx="24"/><text class="label" x="150" y="55" text-anchor="middle">Patterns &amp; Planning</text><text class="sub" x="150" y="88" text-anchor="middle">ReAct · Plan · Reflect</text></g>
<g transform="translate(1240 410)"><rect class="node" width="300" height="140" rx="24"/><text class="label" x="150" y="55" text-anchor="middle">Memory &amp; Context</text><text class="sub" x="150" y="88" text-anchor="middle">Working · Episodic · Semantic</text></g>
<g transform="translate(1060 720)"><rect class="node" width="300" height="140" rx="24"/><text class="label" x="150" y="55" text-anchor="middle">Tools · MCP · RAG</text><text class="sub" x="150" y="88" text-anchor="middle">Capabilities · Evidence</text></g>
<g transform="translate(650 790)"><rect class="node" width="300" height="140" rx="24"/><text class="label" x="150" y="55" text-anchor="middle">Multi-Agent</text><text class="sub" x="150" y="88" text-anchor="middle">Roles · Delegation · A2A</text></g>
<g transform="translate(240 720)"><rect class="node" width="300" height="140" rx="24"/><text class="label" x="150" y="55" text-anchor="middle">Security</text><text class="sub" x="150" y="88" text-anchor="middle">Policy · Risk · Approval</text></g>
<g transform="translate(60 410)"><rect class="node" width="300" height="140" rx="24"/><text class="label" x="150" y="55" text-anchor="middle">Observability</text><text class="sub" x="150" y="88" text-anchor="middle">Trace · Replay · Evaluation</text></g>
<g transform="translate(240 135)"><rect class="node" width="300" height="140" rx="24"/><text class="label" x="150" y="55" text-anchor="middle">Production Platform</text><text class="sub" x="150" y="88" text-anchor="middle">Workers · Budgets · SLOs</text></g>
<g transform="translate(650 390)"><rect width="300" height="220" rx="28" fill="none" stroke="#ae7cff" stroke-width="3" opacity=".4"/></g>
<g transform="translate(650 390)"><text class="label" text-anchor="middle" x="150" y="205" fill="#ae7cff">Sky365 Agentic</text></g>
<circle class="dot" r="8"><animateMotion dur="3.8s" repeatCount="indefinite" path="M800 165L800 500L1190 790"/></circle>
<circle class="dot" r="8"><animateMotion dur="4.4s" repeatCount="indefinite" path="M230 480L800 500L1370 480"/></circle>
</svg>