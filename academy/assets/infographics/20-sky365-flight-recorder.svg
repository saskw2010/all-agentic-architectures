<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" role="img" aria-labelledby="t d">
<title id="t">Sky365 Agentic Flight Recorder</title><desc id="d">The end-to-end controlled execution path from raw request to final action.</desc>
<defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#36e7d2"/><stop offset=".55" stop-color="#5d8cff"/><stop offset="1" stop-color="#ae7cff"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.h{font:800 46px 'Segoe UI',sans-serif;fill:#edf7ff}.s{font:18px 'Segoe UI',sans-serif;fill:#91a9bd}.n{font:800 20px 'Segoe UI',sans-serif;fill:#36e7d2}.k{font:700 22px 'Segoe UI',sans-serif;fill:#edf7ff}.box{fill:#0b1828;stroke:#31516b;stroke-width:2}.rail{stroke:url(#g);stroke-width:9;fill:none;stroke-linecap:round}.gate{fill:#151d35;stroke:#ae7cff;stroke-width:3}</style></defs>
<rect width="1800" height="1000" rx="36" fill="#06101d"/>
<text x="900" y="78" text-anchor="middle" class="h">SKY365 AGENTIC — FLIGHT RECORDER</text>
<text x="900" y="118" text-anchor="middle" class="s">Every transformation is visible, governed, replayable, and attributable</text>
<path class="rail" d="M100 500H1700" opacity=".35"/>
<g transform="translate(55 390)"><rect class="box" width="130" height="220" rx="22"/><text class="n" x="65" y="42" text-anchor="middle">01</text><text class="k" x="65" y="100" text-anchor="middle">RAW</text><text class="s" x="65" y="140" text-anchor="middle">Request</text></g>
<g transform="translate(200 390)"><rect class="box" width="130" height="220" rx="22"/><text class="n" x="65" y="42" text-anchor="middle">02</text><text class="k" x="65" y="100" text-anchor="middle">CONTEXT</text><text class="s" x="65" y="140" text-anchor="middle">Scope</text></g>
<g transform="translate(345 390)"><rect class="box" width="130" height="220" rx="22"/><text class="n" x="65" y="42" text-anchor="middle">03</text><text class="k" x="65" y="100" text-anchor="middle">INTENT</text><text class="s" x="65" y="140" text-anchor="middle">Meaning</text></g>
<g transform="translate(490 390)"><rect class="box" width="130" height="220" rx="22"/><text class="n" x="65" y="42" text-anchor="middle">04</text><text class="k" x="65" y="100" text-anchor="middle">ENTITY</text><text class="s" x="65" y="140" text-anchor="middle">Resolve</text></g>
<g transform="translate(635 340)"><rect class="gate" width="155" height="320" rx="26"/><text class="n" x="78" y="48" text-anchor="middle">CONTROL</text><text class="k" x="78" y="125" text-anchor="middle">POLICY</text><text class="k" x="78" y="165" text-anchor="middle">RISK</text><text class="s" x="78" y="225" text-anchor="middle">Allow</text><text class="s" x="78" y="255" text-anchor="middle">Draft</text><text class="s" x="78" y="285" text-anchor="middle">Block</text></g>
<g transform="translate(805 390)"><rect class="box" width="130" height="220" rx="22"/><text class="n" x="65" y="42" text-anchor="middle">07</text><text class="k" x="65" y="100" text-anchor="middle">ROUTE</text><text class="s" x="65" y="140" text-anchor="middle">Pattern</text></g>
<g transform="translate(950 390)"><rect class="box" width="130" height="220" rx="22"/><text class="n" x="65" y="42" text-anchor="middle">08</text><text class="k" x="65" y="100" text-anchor="middle">PLAN</text><text class="s" x="65" y="140" text-anchor="middle">Steps</text></g>
<g transform="translate(1095 390)"><rect class="box" width="130" height="220" rx="22"/><text class="n" x="65" y="42" text-anchor="middle">09</text><text class="k" x="65" y="100" text-anchor="middle">DRAFT</text><text class="s" x="65" y="140" text-anchor="middle">Artifact</text></g>
<g transform="translate(1240 340)"><rect class="gate" width="155" height="320" rx="26"/><text class="n" x="78" y="48" text-anchor="middle">HUMAN GATE</text><text class="k" x="78" y="125" text-anchor="middle">VALIDATE</text><text class="k" x="78" y="165" text-anchor="middle">APPROVE</text><text class="s" x="78" y="225" text-anchor="middle">Maker</text><text class="s" x="78" y="255" text-anchor="middle">Checker</text></g>
<g transform="translate(1410 390)"><rect class="box" width="130" height="220" rx="22"/><text class="n" x="65" y="42" text-anchor="middle">12</text><text class="k" x="65" y="100" text-anchor="middle">ACTION</text><text class="s" x="65" y="140" text-anchor="middle">Core</text></g>
<g transform="translate(1555 390)"><rect class="box" width="130" height="220" rx="22"/><text class="n" x="65" y="42" text-anchor="middle">13</text><text class="k" x="65" y="100" text-anchor="middle">FINAL</text><text class="s" x="65" y="140" text-anchor="middle">ERP + Trace</text></g>
<circle r="12" fill="#36e7d2" filter="url(#glow)"><animateMotion dur="8s" repeatCount="indefinite" path="M100 500H1700"/></circle>
<g transform="translate(270 760)"><rect class="box" width="1260" height="120" rx="24"/><text class="n" x="630" y="38" text-anchor="middle">TRACE ENVELOPE</text><text class="s" x="630" y="77" text-anchor="middle">TraceId · ConversationId · SessionId · RequestId · CorrelationId · UserId · TenantId</text></g>
</svg>