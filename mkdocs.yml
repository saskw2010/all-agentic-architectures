      - "Add your own architecture": tutorials/adding-your-own.md
      - "The deterministic-picker pattern": tutorials/deterministic-picker.md
      - "Memory in agents": tutorials/memory.md
  - Benchmarks: benchmarks.md
  - API Reference:
      - reference/index.md
      - Base: reference/base.md
      - Architectures: reference/architectures.md
