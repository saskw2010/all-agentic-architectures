site_name: Agentic Architectures
site_description: >
  35 production-grade agentic AI architectures with LangGraph — every one
  fully runnable end-to-end, multi-provider (Nebius / OpenAI / Anthropic / Groq / Ollama),
  with real LLM outputs, deterministic-picker discipline, and a comparative benchmark leaderboard.
site_author: Fareed Khan
site_url: https://fareedkhan-dev.github.io/all-agentic-architectures/

repo_name: FareedKhan-dev/all-agentic-architectures
repo_url: https://github.com/FareedKhan-dev/all-agentic-architectures
edit_uri: edit/main/docs/

# ----------------------------------------------------------------------------
# Theme — Material
# ----------------------------------------------------------------------------
theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: black
      accent: blue
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github
    logo: material/graph-outline

extra_css:
  - stylesheets/extra.css

# ----------------------------------------------------------------------------
# Plugins
# ----------------------------------------------------------------------------
plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      ignore_h1_titles: true
      execute: false               # notebooks are already executed via papermill
      allow_errors: false
      kernel_name: python3
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            heading_level: 2

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# ----------------------------------------------------------------------------
