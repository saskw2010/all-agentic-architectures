          - architectures/10_mental_loop.ipynb
          - architectures/13_ensemble.ipynb
      - "Retrieval (RAG)":
          - architectures/23_agentic_rag.ipynb
          - architectures/24_corrective_rag.ipynb
          - architectures/25_self_rag.ipynb
          - architectures/26_adaptive_rag.ipynb
          - architectures/27_graph_rag.ipynb
      - "Memory":
