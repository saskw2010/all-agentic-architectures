name: Deploy Sky365 Portal and Subapplications to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "portal/**"
      - "academy/**"
      - "learning-paths/**"
      - "stories/**"
      - "agentic-design-studio/**"
      - "README.md"
      - "AUTHORS.md"
      - ".github/workflows/academy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build portal and subapplications
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/academy _site/strategy _site/learning-paths _site/stories _site/agentic-design-studio

          # Main portal at repository root.
          cp -R portal/. _site/

          # Academy as an independent subapplication, including /academy/local-ai/.
          rsync -a --exclude 'strategy/' academy/ _site/academy/

          # Strategy as an independent subapplication.
          cp -R academy/strategy/. _site/strategy/

          # Learning Universe as an independent subapplication.
          cp -R learning-paths/. _site/learning-paths/

          # Skyverse Stories and their independent story routes.
          cp -R stories/. _site/stories/

          # Agentic Design Studio as an independent subapplication.
          cp -R agentic-design-studio/. _site/agentic-design-studio/

          # Cross-application navigation in deployed output.
          sed -i 's|<div class="top-actions">|<div class="top-actions"><a class="repo-link" href="../">Portal ↗</a><a class="repo-link" href="local-ai/">Local AI ↗</a><a class="repo-link" href="../learning-paths/">Learning Paths ↗</a><a class="repo-link" href="../stories/">Stories ↗</a><a class="repo-link" href="../strategy/">Strategy ↗</a><a class="repo-link" href="../agentic-design-studio/">Design Studio ↗</a>|' _site/academy/index.html
          sed -i 's|<div class="toplinks">|<div class="toplinks"><a href="academy/local-ai/">Local AI</a>|' _site/index.html
          sed -i 's|https://saskw2010.github.io/all-agentic-architectures/|https://saskw2010.github.io/all-agentic-architectures/academy/|g' _site/academy/index.html
          sed -i 's|href="../">Academy ↗|href="../academy/">Academy ↗|g' _site/strategy/index.html
          sed -i 's|<div class="top-actions">|<div class="top-actions"><a class="academy-link" href="../">Portal ↗</a><a class="academy-link" href="../academy/local-ai/">Local AI ↗</a><a class="academy-link" href="../learning-paths/">Learning Paths ↗</a><a class="academy-link" href="../stories/">Stories ↗</a><a class="academy-link" href="../agentic-design-studio/">Design Studio ↗</a>|' _site/strategy/index.html
          sed -i 's|<a href="../">Agentic Systems Academy ↗</a>|<a href="../academy/">Agentic Systems Academy ↗</a><a href="../academy/local-ai/">Local AI Academy ↗</a><a href="../learning-paths/">Learning Universe ↗</a><a href="../stories/">Skyverse Stories ↗</a><a href="../agentic-design-studio/">Agentic Design Studio ↗</a><a href="../">Project Portal ↗</a>|' _site/strategy/index.html

          # Authorship metadata and visible attribution for our Sky365 layer.
          for page in _site/index.html _site/academy/index.html _site/academy/local-ai/index.html _site/strategy/index.html _site/learning-paths/index.html _site/stories/index.html _site/stories/turing-trail/index.html _site/agentic-design-studio/index.html; do
            if ! grep -q '<meta name="author"' "$page"; then
              sed -i 's|<meta name="description"|<meta name="author" content="Mostafa Elnagar · WytSky / Sky365">\n  <meta name="description"|' "$page"
            fi
          done

          sed -i 's|One entrance. Independent applications. Shared direction.|Created by Mostafa Elnagar · WytSky / Sky365 · One entrance. Independent applications. Shared direction.|' _site/index.html
          sed -i 's|<div><strong>Agentic Systems Academy</strong><p>Research × Architecture × Visual Systems × Sky365 Practice</p></div>|<div><strong>Agentic Systems Academy</strong><p>Created by Mostafa Elnagar · WytSky / Sky365</p><p>Research × Architecture × Visual Systems × Sky365 Practice</p></div>|' _site/academy/index.html
          sed -i 's|<footer class="footer shell"><div><strong>Sky365 Strategy & Research Index</strong><p>A living decision system, not a static roadmap.</p></div>|<footer class="footer shell"><div><strong>Sky365 Strategy & Research Index</strong><p>Created by Mostafa Elnagar · WytSky / Sky365</p><p>A living decision system, not a static roadmap.</p></div>|' _site/strategy/index.html
          sed -i 's|<footer class="shell"><div><strong>Sky365 Learning Universe</strong><p>One history. Many paths. Reusable knowledge.</p></div>|<footer class="shell"><div><strong>Sky365 Learning Universe</strong><p>Created by Mostafa Elnagar · WytSky / Sky365</p><p>One history. Many paths. Reusable knowledge.</p></div>|' _site/learning-paths/index.html

          touch _site/.nojekyll

      - name: Upload complete site
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
