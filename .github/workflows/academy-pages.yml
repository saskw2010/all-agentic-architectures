name: Deploy Sky365 Portal and Subapplications to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "portal/**"
      - "academy/**"
      - "learning-paths/**"
      - ".github/workflows/academy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build portal and subapplications
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/academy _site/strategy _site/learning-paths

          # Main portal at repository root.
          cp -R portal/. _site/

          # Academy as an independent subapplication.
          rsync -a --exclude 'strategy/' academy/ _site/academy/

          # Strategy as an independent subapplication.
          cp -R academy/strategy/. _site/strategy/

          # Learning Universe as an independent subapplication.
          cp -R learning-paths/. _site/learning-paths/

          # Cross-application navigation in deployed output.
          sed -i 's|<div class="top-actions">|<div class="top-actions"><a class="repo-link" href="../">Portal ↗</a><a class="repo-link" href="../learning-paths/">Learning Paths ↗</a><a class="repo-link" href="../strategy/">Strategy ↗</a>|' _site/academy/index.html
          sed -i 's|https://saskw2010.github.io/all-agentic-architectures/|https://saskw2010.github.io/all-agentic-architectures/academy/|g' _site/academy/index.html
          sed -i 's|href="../">Academy ↗|href="../academy/">Academy ↗|g' _site/strategy/index.html
          sed -i 's|<div class="top-actions">|<div class="top-actions"><a class="academy-link" href="../">Portal ↗</a><a class="academy-link" href="../learning-paths/">Learning Paths ↗</a>|' _site/strategy/index.html
          sed -i 's|<a href="../">Agentic Systems Academy ↗</a>|<a href="../academy/">Agentic Systems Academy ↗</a><a href="../learning-paths/">Learning Universe ↗</a><a href="../">Project Portal ↗</a>|' _site/strategy/index.html

          touch _site/.nojekyll

      - name: Upload complete site
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
