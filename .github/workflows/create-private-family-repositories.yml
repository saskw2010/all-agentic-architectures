name: Create Private Family Repositories

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create-family-repositories:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.FAMILY_REPO_PAT || secrets.GH_PAT || secrets.GITHUB_PAT || secrets.PAT }}
    steps:
      - name: Checkout intelligence implementation
        uses: actions/checkout@v4
        with:
          ref: repository-intelligence-hub-v2

      - name: Validate existing Personal Access Token
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            throw 'No PAT secret was found. Supported names: FAMILY_REPO_PAT, GH_PAT, GITHUB_PAT, or PAT.'
          }
          gh auth status

      - name: Create all missing private family repositories
        shell: pwsh
        run: |
          ./repository-intelligence/scripts/create-family-repositories.ps1 -Owner 'saskw2010'

      - name: Summary
        if: always()
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_STEP_SUMMARY '## Private family repositories'
          Add-Content $env:GITHUB_STEP_SUMMARY ''
          Add-Content $env:GITHUB_STEP_SUMMARY '- Missing family repositories are created as private.'
          Add-Content $env:GITHUB_STEP_SUMMARY '- Existing repositories are skipped safely.'
          Add-Content $env:GITHUB_STEP_SUMMARY '- No repository is deleted, archived, renamed, merged, or force-pushed.'
